name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]
  workflow_dispatch:
    inputs:
      cask:
        description: 'Cask name (e.g. openfortivpn-connect)'
        required: true
      version:
        description: 'Version to update to (without v prefix)'
        required: true
      repo:
        description: 'Source repo (e.g. walcew/openfortivpn-connect)'
        required: true
      asset_pattern:
        description: 'DMG asset name pattern. Use {version} and {arch} as placeholders'
        required: true
        default: 'OpenFortiVpn.Connect_{version}_{arch}.dmg'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4

      - name: Determine parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "cask=${{ github.event.client_payload.cask }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
            echo "repo=${{ github.event.client_payload.repo }}" >> "$GITHUB_OUTPUT"
            echo "asset_pattern=${{ github.event.client_payload.asset_pattern }}" >> "$GITHUB_OUTPUT"
          else
            echo "cask=${{ inputs.cask }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "repo=${{ inputs.repo }}" >> "$GITHUB_OUTPUT"
            echo "asset_pattern=${{ inputs.asset_pattern }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download DMGs and compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.params.outputs.version }}"
          REPO="${{ steps.params.outputs.repo }}"
          PATTERN="${{ steps.params.outputs.asset_pattern }}"

          ARM64_ASSET=$(echo "$PATTERN" | sed "s/{version}/$VERSION/g" | sed "s/{arch}/aarch64/g")
          X64_ASSET=$(echo "$PATTERN" | sed "s/{version}/$VERSION/g" | sed "s/{arch}/x64/g")

          curl -fL -o arm64.dmg "https://github.com/${REPO}/releases/download/v${VERSION}/${ARM64_ASSET}"
          curl -fL -o x64.dmg "https://github.com/${REPO}/releases/download/v${VERSION}/${X64_ASSET}"

          echo "arm64_sha=$(sha256sum arm64.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x64_sha=$(sha256sum x64.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update cask file
        run: |
          CASK="${{ steps.params.outputs.cask }}"
          VERSION="${{ steps.params.outputs.version }}"
          ARM64_SHA="${{ steps.sha.outputs.arm64_sha }}"
          X64_SHA="${{ steps.sha.outputs.x64_sha }}"

          CASK_FILE="Casks/${CASK}.rb"

          if [ ! -f "$CASK_FILE" ]; then
            echo "Error: Cask file $CASK_FILE not found"
            exit 1
          fi

          sed -i "s/  version \".*\"/  version \"$VERSION\"/" "$CASK_FILE"
          sed -i "s/  sha256 arm:   \".*\"/  sha256 arm:   \"$ARM64_SHA\"/" "$CASK_FILE"
          sed -i "s/         intel: \".*\"/         intel: \"$X64_SHA\"/" "$CASK_FILE"

      - name: Commit and push
        run: |
          CASK="${{ steps.params.outputs.cask }}"
          VERSION="${{ steps.params.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update ${CASK} to v${VERSION}"
          git push
